<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>WebGPU sphere</title>
  <script src="gl-matrix-min.js"></script>
  <script type="module" src="./ts/script.ts"></script>
<style>
#app-container {
  position: relative;
  display: inline-block;
}

#orbital-panel {
  background: rgba(20, 20, 25, 0.85);
  color: white;
  padding: 10px 15px;
  border-radius: 8px;
  font-family: sans-serif;
  border: 1px solid #444;
  backdrop-filter: blur(4px);
}

#orbital-panel select {
  margin-left: 10px;
  padding: 4px;
  background: #333;
  color: white;
  border: 1px solid #666;
  border-radius: 4px;
}  

button {
  font-size: xx-large;
}

/* 実際のチェックボックスは隠す */
.hidden-check {
  display: none;
}

/* ボタンの基本スタイル */
.styled-button {
  display: inline-block;
  padding: 10px 20px;
  background-color: #f0f0f0;
  border: 2px solid #ccc;
  cursor: pointer;
  transition: all 0.3s;
  user-select: none; /* テキスト選択を防止 */
}

/* チェックされた時のスタイル (隣接セレクタ + を使用) */
.hidden-check:checked + .styled-button {
  background-color: #007bff;
  color: white;
  border-color: #0056b3;
}
</style>
</head>

<body>
<div id="div-color" style="display:none;">
ambientColor  
  R <input type="number" id="ambient-r" min="0" max="100" value="50" style="width: 3em;" />
  G <input type="number" id="ambient-g" min="0" max="100" value="50" style="width: 3em;" />
  B <input type="number" id="ambient-b" min="0" max="100" value="50" style="width: 3em;" />
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
directionalColor  
  R <input type="number" id="directional-r" min="0" max="100" value="50" style="width: 3em;" />
  G <input type="number" id="directional-g" min="0" max="100" value="50" style="width: 3em;" />
  B <input type="number" id="directional-b" min="0" max="100" value="50" style="width: 3em;" />
</div>

<span id="span-buttons"></span>
<button style="display:none;" id="next-button">Next</button>

<span class="button-checkbox">
  <input type="checkbox" id="auto-rotate" class="hidden-check">
  <label for="auto-rotate" class="styled-button">自動回転</label>
</span>

<select id="sel-visualization" style="display: none;">
    <option value="plaquette">plaquette</option>
    <option value="vortex" selected>vortex</option>
</select>

<span id="orbital-panel" style="display:none;">
    <label for="orbital-select">Select Orbital:</label>
    <select id="orbital-select">
        <option value="1s">1s (Spherical)</option>
        <option value="2pz" selected>2p_z (Dumbbell)</option>
        <option value="3dz2">3d_z² (Donut & Lobes)</option>
    </select>
</span>

<br/>

<div id="app-container">
  <canvas id="world" width="800" height="800" tabindex="0" style="touch-action: none; overscroll-behavior: none;"></canvas>
  
  <div id="higgs-panel" style="display:none; position:absolute; top:10px; left:10px; background:rgba(20, 20, 25, 0.85); color:white; padding:15px; border-radius:8px; font-family:sans-serif; border: 1px solid #444; backdrop-filter: blur(4px);">
      <div style="margin-bottom:10px;">
          <label for="kappa-slider">Kappa (結合強度/温度): </label>
          <input type="range" id="kappa-slider" min="0.0" max="1.2" step="0.01" value="0.3">
          <span id="kappa-value">0.30</span>
      </div>
      <div>
          <label for="lambda-slider">Lambda (ポテンシャル深さ): </label>
          <input type="range" id="lambda-slider" min="0.1" max="2.0" step="0.1" value="1.0">
          <span id="lambda-value">1.00</span>
      </div>
      <p style="font-size:12px; color:#aaa; margin-top:10px; max-width: 350px;">
          ※Kappaを大きくすると「自発的対称性の破れ」が起こり、宇宙に色(質量)がつきます。
      </p>
  </div>


  <div id="gauge-higgs-panel" style="display:none; position:absolute; top:10px; left:10px; background:rgba(20, 20, 25, 0.85); color:white; padding:15px; border-radius:8px; font-family:sans-serif; border: 1px solid #444; backdrop-filter: blur(4px);">
      <div style="margin-bottom:10px;">
          <label for="gh-beta-slider">Beta (β / ゲージ結合): </label>
          <input type="range" id="gh-beta-slider" min="0.0" max="100.0" step="0.1" value="2.0">
          <span id="gh-beta-value">2.0</span>
      </div>
      <div>
          <label for="gh-kappa-slider">Kappa (κ / ヒッグス結合): </label>
          <input type="range" id="gh-kappa-slider" min="0.0" max="2.0" step="0.05" value="0.5">
          <span id="gh-kappa-value">0.50</span>
      </div>
      <p style="font-size:12px; color:#aaa; margin-top:10px; max-width: 350px;">
          ※Kappaを上げると自発的対称性が破れ、ゲージ場(Wボソン)が質量を獲得します。
      </p>
  </div>
</div>

<canvas id="plot-canvas" width="800px" height="400px"></canvas>
</body>

</html>
